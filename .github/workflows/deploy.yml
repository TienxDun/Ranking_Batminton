name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

# Thiết lập quyền hạn cho GitHub Actions để triển khai lên Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Tránh việc chạy nhiều workflow song song khi push liên tục
concurrency:
  group: 'pages'
  cancel-in-progress: true

env:
  NODE_OPTIONS: "--no-deprecation"

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v7

      - name: Thiết lập Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache node modules
        id: cache-npm
        uses: actions/cache@v6
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Cài đặt thư viện phụ thuộc
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Kiểm tra lỗi TypeScript / Lint
        run: npm run lint

      - name: Biên dịch sản phẩm (Build)
        run: npm run build
        env:
          # Truyền API Google Sheets từ GitHub Secret khi build để đóng gói vào JS client
          VITE_GOOGLE_SCRIPT_URL: ${{ secrets.VITE_GOOGLE_SCRIPT_URL }}
          # Base path tương ứng với tên repository trên GitHub Pages
          VITE_BASE_PATH: /Ranking_Batminton/

      # Chỉ tải lên sản phẩm tĩnh nếu build trên nhánh chính để chuẩn bị triển khai
      - name: Tải lên sản phẩm tĩnh
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: actions/upload-pages-artifact@v5
        with:
          path: './dist'

  deploy:
    needs: lint-and-build
    # Chỉ triển khai khi đẩy trực tiếp (hoặc merge) lên các nhánh chính
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Cấu hình môi trường GitHub Pages
        uses: actions/configure-pages@v6

      - name: Triển khai lên GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

